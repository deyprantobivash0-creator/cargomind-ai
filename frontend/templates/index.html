<!DOCTYPE html>
<html>

<head>

<title>CargoMind AI</title>

<style>

body{

font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:700px;
height:600px;
background:white;
border-radius:20px;
box-shadow:0px 5px 20px rgba(0,0,0,.2);
display:flex;
flex-direction:column;
overflow:hidden;

}

.header{

background:#1c4e80;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;

}

.chat-box{

flex:1;
padding:20px;
overflow-y:auto;

}

.user{

background:#d6eaff;
padding:10px;
border-radius:10px;
margin-bottom:15px;
width:fit-content;
margin-left:auto;

}

.bot{

background:#ececec;
padding:10px;
border-radius:10px;
margin-bottom:15px;
width:fit-content;
max-width:80%;

}

.input-area{

display:flex;
padding:20px;
border-top:1px solid #ddd;

}

input{

flex:1;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;

}

button{

margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#1c4e80;
color:white;
cursor:pointer;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

CargoMind AI Support

</div>

<div class="chat-box" id="chatBox">

<div class="bot">

Hello 👋 Welcome to CargoMind AI

</div>

</div>

<div class="input-area">

<input
id="message"
placeholder="Ask your shipment question...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

async function sendMessage(){

let message=document.getElementById("message").value

if(message.trim()=="") return

let chatBox=document.getElementById("chatBox")

let currentTime=new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

chatBox.innerHTML+=`

<div class="user">

${message}

<br>

<small>${currentTime}</small>

</div>

`

document.getElementById("message").value=""

chatBox.innerHTML+=`

<div class="bot" id="typing">

CargoMind is typing...

</div>

`

chatBox.scrollTop=chatBox.scrollHeight


let response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

let data=await response.json()

document.getElementById("typing").remove()

let botTime=new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

chatBox.innerHTML+=`

<div class="bot">

${data.reply}

<br>

<small>${botTime}</small>

</div>

`

chatBox.scrollTop=chatBox.scrollHeight

}


document.getElementById("message")
.addEventListener("keypress",function(event){

if(event.key==="Enter"){

sendMessage()

}

})

</script>
</body>

</html>
